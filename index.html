<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 48%27%3E%3Cg stroke=%27%232BBE8C%27 stroke-width=%272%27 fill=%27none%27%3E%3Cline x1=%2714%27 y1=%2710%27 x2=%2722%27 y2=%276%27/%3E%3Cline x1=%2722%27 y1=%276%27 x2=%2730%27 y2=%279%27/%3E%3Cline x1=%2730%27 y1=%279%27 x2=%2732%27 y2=%2716%27/%3E%3Cline x1=%2732%27 y1=%2716%27 x2=%2732%27 y2=%2728%27/%3E%3Cline x1=%2750%27 y1=%2710%27 x2=%2742%27 y2=%276%27/%3E%3Cline x1=%2742%27 y1=%276%27 x2=%2734%27 y2=%279%27/%3E%3Cline x1=%2734%27 y1=%279%27 x2=%2732%27 y2=%2716%27/%3E%3C/g%3E%3Ccircle cx=%2732%27 cy=%2716%27 r=%273%27 fill=%27%232BBE8C%27/%3E%3Ccircle cx=%2732%27 cy=%2728%27 r=%273%27 fill=%27%232BBE8C%27/%3E%3C/svg%3E">
<title>Smriti — log in</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<canvas id="bg"></canvas>

<!-- BOOT SEQUENCE -->
<div id="boot-screen">
  <div class="boot-dot"></div>
  <p class="boot-text" id="boot-text"></p>
</div>

<main class="login-wrap" id="login-wrap" style="opacity:0;">
  <div class="login-card" id="login-card">
    <div class="sweep"></div>

    <div class="brand">
      <div class="brain-mark">
        <div class="brain-glow"></div>
        <div class="orbital-ring"></div>
        <svg viewBox="0 0 64 48" width="56" height="42">
          <g id="brain-lines" stroke="#2BBE8C" stroke-width="1" fill="none" opacity="0.85">
            <line x1="14" y1="10" x2="22" y2="6"/>
            <line x1="22" y1="6" x2="30" y2="9"/>
            <line x1="30" y1="9" x2="32" y2="16"/>
            <line x1="14" y1="10" x2="10" y2="18"/>
            <line x1="10" y1="18" x2="13" y2="27"/>
            <line x1="13" y1="27" x2="20" y2="33"/>
            <line x1="20" y1="33" x2="28" y2="34"/>
            <line x1="28" y1="34" x2="32" y2="28"/>
            <line x1="32" y1="16" x2="32" y2="28"/>
            <line x1="10" y1="18" x2="18" y2="20"/>
            <line x1="18" y1="20" x2="22" y2="14"/>
            <line x1="22" y1="14" x2="30" y2="9"/>
            <line x1="18" y1="20" x2="13" y2="27"/>
            <line x1="22" y1="14" x2="32" y2="16"/>
            <line x1="50" y1="10" x2="42" y2="6"/>
            <line x1="42" y1="6" x2="34" y2="9"/>
            <line x1="34" y1="9" x2="32" y2="16"/>
            <line x1="50" y1="10" x2="54" y2="18"/>
            <line x1="54" y1="18" x2="51" y2="27"/>
            <line x1="51" y1="27" x2="44" y2="33"/>
            <line x1="44" y1="33" x2="36" y2="34"/>
            <line x1="36" y1="34" x2="32" y2="28"/>
            <line x1="54" y1="18" x2="46" y2="20"/>
            <line x1="46" y1="20" x2="42" y2="14"/>
            <line x1="42" y1="14" x2="34" y2="9"/>
            <line x1="46" y1="20" x2="51" y2="27"/>
            <line x1="42" y1="14" x2="32" y2="16"/>
          </g>
          <g id="brain-nodes" fill="#2BBE8C">
            <circle cx="14" cy="10" r="1.6"/>
            <circle cx="22" cy="6" r="1.6"/>
            <circle cx="30" cy="9" r="1.6"/>
            <circle cx="32" cy="16" r="1.8"/>
            <circle cx="10" cy="18" r="1.6"/>
            <circle cx="13" cy="27" r="1.6"/>
            <circle cx="20" cy="33" r="1.6"/>
            <circle cx="28" cy="34" r="1.6"/>
            <circle cx="32" cy="28" r="1.8"/>
            <circle cx="18" cy="20" r="1.4"/>
            <circle cx="22" cy="14" r="1.4"/>
            <circle cx="50" cy="10" r="1.6"/>
            <circle cx="42" cy="6" r="1.6"/>
            <circle cx="34" cy="9" r="1.6"/>
            <circle cx="54" cy="18" r="1.6"/>
            <circle cx="51" cy="27" r="1.6"/>
            <circle cx="44" cy="33" r="1.6"/>
            <circle cx="36" cy="34" r="1.6"/>
            <circle cx="46" cy="20" r="1.4"/>
            <circle cx="42" cy="14" r="1.4"/>
          </g>
        </svg>
      </div>
      <h1>Smriti</h1>
      <p class="tagline">A&nbsp;RAG&nbsp;Powered&nbsp;Knowledge&nbsp;Recall&nbsp;Engine</p>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="field">
        <input type="text" id="username" required autocomplete="username" placeholder=" ">
        <label for="username">Username</label>
        <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="1.6" d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20c0-3.5 3.6-6 8-6s8 2.5 8 6"/></svg>
      </div>
      <div class="field">
        <input type="password" id="password" required autocomplete="current-password" placeholder=" ">
        <label for="password">Password</label>
        <svg class="field-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="1.6" d="M6 11V8a6 6 0 1112 0v3M5 11h14v9H5v-9z"/></svg>
      </div>

      <button type="submit" id="login-btn">
        <span class="btn-label">Log in</span>
        <span class="btn-rings" aria-hidden="true">
          <span class="ring"></span><span class="ring"></span><span class="ring"></span>
        </span>
      </button>
      <p class="error" id="error-msg"></p>
<p class="demo-hint">Demo — Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>Nikhil@</strong></p>
    </form>
  </div>
</main>

<div class="loading-overlay" id="loading-overlay">
  <div class="recall-graph">
    <div class="recall-ring r1"></div>
    <div class="recall-ring r2"></div>
    <div class="recall-ring r3"></div>
  </div>
  <p class="recall-title">RECALLING MEMORY</p>
  <p class="recall-status" id="recall-status">Accessing memory clusters...</p>
</div>

<div class="flash-overlay" id="flash-overlay"></div>

<script src="js/background.js"></script>
<script src="js/boot.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
